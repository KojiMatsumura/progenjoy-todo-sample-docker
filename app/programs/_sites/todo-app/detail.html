<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TODO 詳細</title>
    <link rel="stylesheet" href="todo.css" />
    <script src="todo-bridge.js" defer></script>
    <script src="detail.js" defer></script>
  </head>
  <body>
    <div class="app detail-page">
      <p class="back-row">
        <a class="back-link" href="index.html">← 一覧へ戻る</a>
      </p>
      <h1>TODO 詳細</h1>
      <p id="status" class="status" aria-live="polite"></p>
      <div id="detail-root" class="detail-root" hidden>
        <h2 id="detail-title" class="detail-title"></h2>
        <dl class="detail-dl">
          <dt>作成日時</dt>
          <dd id="detail-created"></dd>
          <dt>ID</dt>
          <dd><code id="detail-id" class="detail-id"></code></dd>
          <dt>状態</dt>
          <dd>
            <label class="detail-done-label">
              <input type="checkbox" id="detail-done" />
              完了
            </label>
          </dd>
        </dl>
        <div class="detail-actions">
          <button type="button" id="btn-delete" class="btn-danger">削除</button>
        </div>
      </div>
      <div id="detail-notfound" class="detail-notfound" hidden>
        <p>該当する TODO が見つかりません。</p>
        <p><a href="index.html">一覧へ</a></p>
      </div>
    </div>
  </body>
</html>
