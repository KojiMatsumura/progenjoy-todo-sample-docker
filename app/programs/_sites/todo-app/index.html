<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TODO（postMessage CRUD）</title>
    <link rel="stylesheet" href="todo.css" />
    <script src="todo-bridge.js" defer></script>
    <script src="todo.js" defer></script>
  </head>
  <body>
    <div class="app">
      <h1>TODO リスト</h1>
      <p class="sub">
        読込: <code>api_id: 1</code>（content: null）／ 保存:
        <code>api_id: 2</code>（content に <code>todoApp</code> を含むオブジェクト）
      </p>

      <div class="toolbar">
        <input
          id="new-title"
          type="text"
          placeholder="新しい TODO"
          maxlength="500"
          autocomplete="off"
        />
        <button type="button" id="btn-add" class="btn-primary">追加</button>
        <button type="button" id="btn-reload" class="btn-secondary">
          再読込
        </button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
      <div id="todo-list"></div>
    </div>
  </body>
</html>
