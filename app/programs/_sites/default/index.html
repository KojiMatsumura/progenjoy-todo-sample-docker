<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ローカルプログラムランナー（default）</title>
    <link rel="stylesheet" href="default.css" />
    <script src="default.js" defer></script>
  </head>
  <body>
    <h1>ローカル Docker プログラムランナー</h1>
    <p>
      このページは <code>app/programs/_sites/default/</code> から配信されています。URL は
      <code>/programs/default/</code> または、フォルダ名と一致しない
      <code>programId</code>（例: EC の商品 UUID）では同じ内容にフォールバックされます。
    </p>
    <p>
      別プログラムの例:
      <a href="/programs/sample-game/">/programs/sample-game/</a>
    </p>

    <div class="panel">
      <p><strong>postMessage テスト</strong>（親の ProgramIframeBridge 向け）</p>
      <button type="button" id="btn-ping">api_id:1（data.json 読込）を送る</button>
      <button type="button" id="btn-save">api_id:2（data.json 保存）を送る</button>
      <button type="button" id="btn-run-code">
        api_id:3（親でワーカー実行・return 2+2）
      </button>
      <p>
        <a href="./subpage.html">サブページへ</a>（通常のリンク遷移）
      </p>
      <div id="log"></div>
    </div>
  </body>
</html>
