server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # トップ・ヘルスなど（子サイト以外）。EC から別オリジンで iframe する場合は runner オリジンのまま
    add_header X-Frame-Options "" always;
    add_header Content-Security-Policy "frame-ancestors *" always;

    # ヘルスチェック・疎通確認
    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    # postMessage api_id 1/2 用ストレージ（runner-api → リポジトリルート data.json）
    location = /api/runner-data {
        proxy_pass http://runner-api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # /program/<リポジトリ名>/  子サイトをディレクトリ単位でホスト
    # -------------------------------------------------------------------------
    location ~ ^/program/([^/]+)$ {
        include /etc/nginx/snippets/child-site-headers.conf;
        return 301 $scheme://$http_host$uri/;
    }

    location ~ ^/program/([^/]+)/(.+)$ {
        include /etc/nginx/snippets/child-site-headers.conf;
        alias /usr/share/nginx/children/$1/$2;
    }

    location ~ ^/program/([^/]+)/$ {
        include /etc/nginx/snippets/child-site-headers.conf;
        alias /usr/share/nginx/children/$1/;
        index index.html;
    }

    # -------------------------------------------------------------------------
    # /programs/<productId>/  program-ec-frontend の iframe と同一 URL 形
    # -------------------------------------------------------------------------
    location ~ ^/programs/[^/]+$ {
        include /etc/nginx/snippets/child-site-headers.conf;
        return 301 $scheme://$http_host$uri/;
    }

    location ~ ^/programs/[^/]+/(.+)$ {
        include /etc/nginx/snippets/child-site-headers.conf;
        alias /usr/share/nginx/children/_default/$1;
    }

    location ~ ^/programs/[^/]+/$ {
        include /etc/nginx/snippets/child-site-headers.conf;
        alias /usr/share/nginx/children/_default/;
        index index.html;
    }

    location = / {
        try_files /index.html =404;
    }
}
