# iframe 子サイト（/program/ /programs/）向け。location 内で include すること。
# frame-ancestors: 同一ランナー（top-page の iframe）＋ program-ec-frontend（既定ポート 3000）
# localhost と 127.0.0.1 は別オリジン扱いのため両方列挙。ランナーポートを変えたら 8787 を合わせて変更。
add_header X-Frame-Options "" always;
add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; frame-ancestors 'self' http://localhost:8787 http://127.0.0.1:8787 http://localhost:3000 http://127.0.0.1:3000; form-action 'none'; navigate-to 'none'; frame-src 'none'; worker-src 'none'; object-src 'none'; base-uri 'none';" always;
