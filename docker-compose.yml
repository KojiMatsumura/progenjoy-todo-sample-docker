services:
  program-runner:
    build: .
    ports:
      - "${PROGRAM_RUNNER_PORT:-8787}:3000"
    environment:
      DATA_FILE: /app/data.json
      # リポジトリでは app/programs/_sites。Docker の cwd は /app のため二重 app
      PROGRAM_SITES_DIR: /app/app/programs/_sites
      PORT: 3000
    volumes:
      - ./data.json:/app/data.json
      - ./app/programs/_sites:/app/app/programs/_sites:ro
