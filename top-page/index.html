<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>プログラムテスト | ローカルランナー</title>
    <style>
      :root {
        --orange: #e85d04;
        --orange-hover: #d45103;
        --gray-50: #f9fafb;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-400: #9ca3af;
        --gray-500: #6b7280;
        --gray-600: #4b5563;
        --gray-700: #374151;
        --gray-900: #111827;
        --panel: #111827;
        --panel-border: #374151;
        --log-muted: #6b7280;
        --log-in: #fbbf24;
        --log-out: #34d399;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #fff;
        color: var(--gray-900);
      }
      a {
        color: var(--orange);
        text-decoration: underline;
      }
      a:hover {
        color: var(--orange-hover);
      }
      .main {
        max-width: 80rem;
        margin: 0 auto;
        padding: 1.5rem 1rem;
      }
      @media (min-width: 640px) {
        .main {
          padding: 2rem 1.5rem;
        }
      }
      @media (min-width: 1024px) {
        .main {
          padding: 2rem 2rem;
        }
      }
      .page-title {
        margin: 0 0 1rem;
        font-size: 1.25rem;
        font-weight: 700;
      }
      @media (min-width: 640px) {
        .page-title {
          margin-bottom: 1.5rem;
          font-size: 1.5rem;
        }
      }
      .lead {
        margin: 0 0 0.5rem;
        font-size: 0.875rem;
        color: var(--gray-600);
      }
      .lead:last-of-type {
        margin-bottom: 1.5rem;
      }
      @media (min-width: 640px) {
        .lead:last-of-type {
          margin-bottom: 2rem;
        }
      }
      .grid {
        display: grid;
        gap: 1.5rem;
      }
      @media (min-width: 1024px) {
        .grid {
          grid-template-columns: 1fr 320px;
          gap: 2rem;
          align-items: start;
        }
      }
      .runner-card {
        overflow: hidden;
        border-radius: 0.75rem;
        border: 1px solid var(--gray-200);
        background: #fff;
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
      }
      .viewport {
        position: relative;
        isolation: isolate;
        aspect-ratio: 16 / 10;
        width: 100%;
        background: var(--gray-900);
      }
      .viewport.viewport-expanded {
        position: fixed;
        inset: 0;
        z-index: 60;
        aspect-ratio: unset;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #000;
        padding: 0.5rem;
      }
      @media (min-width: 640px) {
        .viewport.viewport-expanded {
          padding: 0.75rem;
        }
      }
      .viewport-inner {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }
      .viewport.viewport-expanded .viewport-inner {
        position: relative;
        flex: 1;
        min-height: 0;
      }
      .viewport iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .fs-btn {
        pointer-events: auto;
        position: absolute;
        bottom: 0.75rem;
        right: 0.75rem;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 9999px;
        border: 1px solid rgb(255 255 255 / 0.15);
        background: rgb(0 0 0 / 0.55);
        color: #fff;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2);
        backdrop-filter: blur(4px);
        cursor: pointer;
        transition: background 0.15s;
      }
      .fs-btn:hover {
        background: rgb(0 0 0 / 0.75);
      }
      .viewport.viewport-expanded .fs-btn {
        bottom: 1.25rem;
        right: 1.25rem;
        width: 2.75rem;
        height: 2.75rem;
      }
      @media (min-width: 640px) {
        .viewport.viewport-expanded .fs-btn {
          bottom: 1.5rem;
          right: 1.5rem;
        }
      }
      .fs-btn svg {
        width: 1.125rem;
        height: 1.125rem;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }
      .aside {
        display: flex;
        flex-direction: column;
      }
      @media (min-width: 1024px) {
        .aside {
          position: sticky;
          top: 1rem;
        }
      }
      .log-panel {
        flex: 1;
        overflow: hidden;
        border-radius: 0.75rem;
        border: 1px solid var(--gray-200);
        background: var(--panel);
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
      }
      .log-head {
        border-bottom: 1px solid var(--panel-border);
        padding: 0.5rem 0.75rem;
      }
      .log-head h2 {
        margin: 0;
        font-size: 0.875rem;
        font-weight: 600;
        color: #e5e7eb;
      }
      .log-body {
        max-height: 20rem;
        overflow-y: auto;
        padding: 0.75rem;
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
      }
      @media (min-width: 640px) {
        .log-body {
          max-height: 24rem;
        }
      }
      .log-empty {
        margin: 0;
        color: var(--log-muted);
      }
      .log-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .log-list li {
        margin-bottom: 0.375rem;
        word-break: break-all;
        color: #d1d5db;
      }
      .log-time {
        color: var(--log-muted);
        margin-right: 0.5rem;
      }
      .log-dir-in {
        color: var(--log-in);
      }
      .log-dir-out {
        color: var(--log-out);
      }
      .log-data {
        display: block;
        padding-left: 1rem;
        color: #9ca3af;
        margin-top: 0.125rem;
      }
      .badge-local {
        margin-left: 0.5rem;
        font-size: 0.65rem;
        font-weight: 600;
        vertical-align: middle;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        background: #fef3c7;
        color: #92400e;
        text-decoration: none;
      }
      .program-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 1rem;
        margin-bottom: 1rem;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid var(--gray-200);
        background: var(--gray-50);
      }
      .program-bar label {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--gray-700);
      }
      .program-bar select {
        min-width: 12rem;
        max-width: 100%;
        padding: 0.45rem 0.65rem;
        font-size: 0.875rem;
        border-radius: 0.5rem;
        border: 1px solid var(--gray-300);
        background: #fff;
        color: var(--gray-900);
      }
      .program-bar select:focus {
        outline: 2px solid var(--orange);
        outline-offset: 1px;
      }
      .program-bar .hint {
        margin: 0;
        font-size: 0.75rem;
        color: var(--gray-500);
        flex-basis: 100%;
      }
    </style>
  </head>
  <body>
    <main class="main">
      <h1 class="page-title" id="page-title">プログラムテスト: ローカルデモプログラム</h1>
      <p class="lead">
        iframe でプログラムを実行し、postMessage のやり取りをログで確認できます。
      </p>
      <p class="lead">
        <a href="#" onclick="return false">投稿者向けの詳細（別タブで開く）</a>
        <span class="badge-local">Docker モック</span>
      </p>

      <div class="program-bar">
        <label for="program-select">表示する子プログラム</label>
        <select id="program-select" aria-describedby="program-hint" disabled>
          <option value="">一覧を読み込み中…</option>
        </select>
        <p class="hint" id="program-hint">
          一覧は <code>/api/child-programs</code> が <code>children</code> 直下のフォルダを走査して自動生成します（
          <code>_default</code> → <code>/programs/&lt;productId&gt;/</code>、それ以外 →
          <code>/program/&lt;フォルダ名&gt;/</code>）。
        </p>
      </div>

      <div class="grid">
        <div class="runner-card">
          <div class="viewport" id="viewport">
            <div class="viewport-inner">
              <iframe
                id="runner-frame"
                src="/programs/local-demo/"
                title="ローカルデモプログラム"
                sandbox="allow-scripts"
              ></iframe>
            </div>
            <button type="button" class="fs-btn" id="fs-btn" aria-label="プログラム表示を全画面にする">
              <svg id="fs-icon-expand" viewBox="0 0 24 24" aria-hidden="true">
                <polyline
                  points="15 3 21 3 21 9"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <polyline
                  points="9 21 3 21 3 15"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <line x1="21" x2="14" y1="3" y2="10" stroke-linecap="round" />
                <line x1="3" x2="10" y1="21" y2="14" stroke-linecap="round" />
              </svg>
              <svg
                id="fs-icon-collapse"
                viewBox="0 0 24 24"
                aria-hidden="true"
                style="display: none"
              >
                <polyline
                  points="4 14 10 14 10 20"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <polyline
                  points="20 10 14 10 14 4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <line x1="14" x2="21" y1="10" y2="3" stroke-linecap="round" />
                <line x1="3" x2="10" y1="21" y2="14" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>

        <aside class="aside">
          <div class="log-panel">
            <div class="log-head">
              <h2>通信ログ</h2>
            </div>
            <div class="log-body" id="log-body">
              <p class="log-empty" id="log-empty">
                まだログはありません。プログラムが API を呼び出すとここに表示されます。
              </p>
              <ul class="log-list" id="log-list" hidden></ul>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script>
      (function () {
        /**
         * API が使えないときのみ（例: 静的ファイルを直接開いた場合）。
         * Docker では /api/child-programs が children を走査して返します。
         */
        var FALLBACK_CHILD_PROGRAMS = [
          {
            id: "default",
            label: "ローカルデモ (_default)",
            path: "/programs/local-demo/",
            iframeTitle: "ローカルデモプログラム",
          },
          {
            id: "sample-game",
            label: "sample-game (/program/sample-game/)",
            path: "/program/sample-game/",
            iframeTitle: "sample-game",
          },
        ];

        function fetchChildProgramList() {
          return fetch("/api/child-programs", { credentials: "same-origin" })
            .then(function (r) {
              if (!r.ok) throw new Error("bad status");
              return r.json();
            })
            .then(function (j) {
              if (
                j &&
                j.programs &&
                Array.isArray(j.programs) &&
                j.programs.length
              ) {
                return j.programs;
              }
              return null;
            })
            .catch(function () {
              return null;
            });
        }

        function boot(childPrograms) {
          function findProgramById(id) {
            for (var i = 0; i < childPrograms.length; i++) {
              if (childPrograms[i].id === id) return childPrograms[i];
            }
            return childPrograms[0];
          }

          var params = new URLSearchParams(window.location.search);
          var name = params.get("name");
          var programParam = params.get("program");
          var selectedProgram = findProgramById(programParam);

          var pageTitleEl = document.getElementById("page-title");
          var runnerFrame = document.getElementById("runner-frame");
          var programSelect = document.getElementById("program-select");

          programSelect.innerHTML = "";
          childPrograms.forEach(function (p) {
            var opt = document.createElement("option");
            opt.value = p.id;
            opt.textContent = p.label;
            programSelect.appendChild(opt);
          });
          programSelect.disabled = false;
          programSelect.value = selectedProgram.id;
          runnerFrame.src = selectedProgram.path;

          function applyTitle() {
            if (name) {
              pageTitleEl.textContent = "プログラムテスト: " + name;
              runnerFrame.title = name;
            } else {
              pageTitleEl.textContent =
                "プログラムテスト: " + selectedProgram.label;
              runnerFrame.title = selectedProgram.iframeTitle;
            }
          }
          applyTitle();

          function setProgramQueryInUrl(id) {
            var u = new URL(window.location.href);
            u.searchParams.set("program", id);
            history.replaceState(null, "", u.pathname + u.search);
          }

          programSelect.addEventListener("change", function () {
            selectedProgram = findProgramById(programSelect.value);
            runnerFrame.src = selectedProgram.path;
            applyTitle();
            setProgramQueryInUrl(selectedProgram.id);
            clearLog();
          });

          var viewport = document.getElementById("viewport");
        var fsBtn = document.getElementById("fs-btn");
        var iconEx = document.getElementById("fs-icon-expand");
        var iconCol = document.getElementById("fs-icon-collapse");
        var expanded = false;

        function setFsUi() {
          if (expanded) {
            iconEx.style.display = "none";
            iconCol.style.display = "block";
            fsBtn.setAttribute(
              "aria-label",
              "プログラム表示を通常サイズに戻す"
            );
          } else {
            iconEx.style.display = "block";
            iconCol.style.display = "none";
            fsBtn.setAttribute(
              "aria-label",
              "プログラム表示を全画面にする"
            );
          }
        }

        fsBtn.addEventListener("click", function () {
          expanded = !expanded;
          viewport.classList.toggle("viewport-expanded", expanded);
          document.body.style.overflow = expanded ? "hidden" : "";
          setFsUi();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && expanded) {
            expanded = false;
            viewport.classList.remove("viewport-expanded");
            document.body.style.overflow = "";
            setFsUi();
          }
        });

        var logEmpty = document.getElementById("log-empty");
        var logList = document.getElementById("log-list");
        var iframe = runnerFrame;

        function clearLog() {
          logList.innerHTML = "";
          logEmpty.hidden = false;
          logList.hidden = true;
        }
        /**
         * allow-same-origin なしの sandbox 子は不透明オリジンとなり、ev.origin は "null"。
         * postMessage の第2引数に "null" や実オリジンは使えないため、子への返信は '*' のみ有効。
         */
        var childReplyTarget = "*";
        var maxEntries = 200;

        function pad2(n) {
          return n < 10 ? "0" + n : String(n);
        }
        function formatTime(d) {
          return (
            pad2(d.getUTCHours()) +
            ":" +
            pad2(d.getUTCMinutes()) +
            ":" +
            pad2(d.getUTCSeconds()) +
            "." +
            String(d.getUTCMilliseconds()).padStart(3, "0")
          );
        }

        function appendLog(direction, message, data) {
          logEmpty.hidden = true;
          logList.hidden = false;
          var li = document.createElement("li");
          var t = document.createElement("span");
          t.className = "log-time";
          t.textContent = formatTime(new Date());
          li.appendChild(t);
          var dir = document.createElement("span");
          dir.className =
            direction === "in" ? "log-dir-in" : "log-dir-out";
          dir.textContent = "[" + direction + "] ";
          li.appendChild(dir);
          li.appendChild(document.createTextNode(message));
          if (data !== undefined) {
            var pre = document.createElement("span");
            pre.className = "log-data";
            try {
              pre.textContent = JSON.stringify(data);
            } catch {
              pre.textContent = String(data);
            }
            li.appendChild(pre);
          }
          logList.appendChild(li);
          while (logList.children.length > maxEntries) {
            logList.removeChild(logList.firstChild);
          }
          li.scrollIntoView({ block: "nearest" });
        }

        var bridgeBusy = false;

        function isApi042(data) {
          return (
            typeof data === "object" &&
            data !== null &&
            data.api_id === 1 &&
            data.content === null
          );
        }

        function isApi043(data) {
          if (typeof data !== "object" || data === null) return false;
          if (data.api_id !== 2 || !("content" in data)) return false;
          var c = data.content;
          return (
            typeof c === "object" && c !== null && !Array.isArray(c)
          );
        }

        /** child-program-override の monitor と同形: { api_id: 3, content: { code: string } } */
        function isRunUserLogicRequest(data) {
          if (typeof data !== "object" || data === null) return false;
          if (data.api_id !== 3) return false;
          var c = data.content;
          if (typeof c !== "object" || c === null || Array.isArray(c)) return false;
          return typeof c.code === "string";
        }

        function createSecureWorkerBlob(userCode) {
          var head =
            "(function() {\n" +
            "  var forbidden = ['Worker', 'fetch', 'XMLHttpRequest', 'WebSocket', 'importScripts'];\n" +
            "  forbidden.forEach(function(prop) {\n" +
            "    Object.defineProperty(self, prop, {\n" +
            "      value: undefined,\n" +
            "      writable: false,\n" +
            "      configurable: false\n" +
            "    });\n" +
            "  });\n" +
            "  self.onmessage = function(event) {\n" +
            "    try {\n" +
            "      var result = (function() {\n";
          var tail =
            "      })();\n" +
            "      postMessage(result);\n" +
            "    } catch (err) {\n" +
            "      postMessage({\n" +
            "        type: 'error',\n" +
            "        data: err && err.message ? String(err.message) : String(err)\n" +
            "      });\n" +
            "    }\n" +
            "  };\n" +
            "})();\n";
          return new Blob([head + userCode + tail], {
            type: "application/javascript",
          });
        }

        function runUserLogic(userCode) {
          return new Promise(function (resolve, reject) {
            var blob = createSecureWorkerBlob(userCode);
            var workerURL = URL.createObjectURL(blob);
            var worker = new Worker(workerURL);
            var timeout = setTimeout(function () {
              worker.terminate();
              URL.revokeObjectURL(workerURL);
              reject(new Error("Timeout"));
            }, 3000);
            worker.onmessage = function (e) {
              clearTimeout(timeout);
              worker.terminate();
              URL.revokeObjectURL(workerURL);
              var d = e.data;
              if (
                d &&
                typeof d === "object" &&
                d !== null &&
                "type" in d &&
                d.type === "error"
              ) {
                reject(
                  new Error(
                    typeof d.data === "string" ? d.data : "Worker error"
                  )
                );
                return;
              }
              resolve(d);
            };
            worker.onerror = function (err) {
              clearTimeout(timeout);
              worker.terminate();
              URL.revokeObjectURL(workerURL);
              reject(err);
            };
            worker.postMessage(undefined);
          });
        }

        function postBackToChild(source, res, body) {
          var payload;
          if (!res.ok) {
            payload = Object.assign(
              { error: true, status: res.status },
              body && typeof body === "object" ? body : {}
            );
          } else {
            payload = body;
          }
          source.postMessage(payload, childReplyTarget);
        }

        window.addEventListener("message", function (ev) {
          if (ev.source !== iframe.contentWindow) return;
          appendLog("in", "postMessage received", ev.data);

          if (isApi042(ev.data)) {
            if (bridgeBusy) return;
            bridgeBusy = true;
            void (async function () {
              try {
                var res = await fetch("/api/runner-data", {
                  credentials: "same-origin",
                });
                var body = await res.json().catch(function () {
                  return {};
                });
                appendLog("out", "api_id:1 → data.json 読込", body);
                postBackToChild(ev.source, res, body);
              } catch (err) {
                appendLog("out", "api_id:1 network_error", String(err));
                ev.source.postMessage(
                  { error: true, status: 500, message: "network_error" },
                  childReplyTarget
                );
              } finally {
                bridgeBusy = false;
              }
            })();
            return;
          }

          if (isRunUserLogicRequest(ev.data)) {
            void (async function () {
              try {
                var result = await runUserLogic(ev.data.content.code);
                var out = { api_id: 3, content: { result: result } };
                appendLog("out", "api_id:3 → worker OK", out);
                ev.source.postMessage(out, childReplyTarget);
              } catch (err) {
                var msg = err instanceof Error ? err.message : String(err);
                var outErr = { api_id: 3, content: { error: msg } };
                appendLog("out", "api_id:3 → worker error", outErr);
                ev.source.postMessage(outErr, childReplyTarget);
              }
            })();
            return;
          }

          if (isApi043(ev.data)) {
            if (bridgeBusy) return;
            bridgeBusy = true;
            void (async function () {
              try {
                var res = await fetch("/api/runner-data", {
                  method: "PUT",
                  credentials: "same-origin",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ content: ev.data.content }),
                });
                var body = await res.json().catch(function () {
                  return {};
                });
                appendLog("out", "api_id:2 → data.json 保存", body);
                postBackToChild(ev.source, res, body);
              } catch (err) {
                appendLog("out", "api_id:2 network_error", String(err));
                ev.source.postMessage(
                  { error: true, status: 500, message: "network_error" },
                  childReplyTarget
                );
              } finally {
                bridgeBusy = false;
              }
            })();
            return;
          }
        });
        }

        void fetchChildProgramList().then(function (list) {
          boot(
            list && list.length ? list : FALLBACK_CHILD_PROGRAMS
          );
        });
      })();
    </script>
  </body>
</html>
