<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>プログラムテスト | ローカルランナー</title>
    <style>
      :root {
        --orange: #e85d04;
        --orange-hover: #d45103;
        --gray-50: #f9fafb;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-400: #9ca3af;
        --gray-500: #6b7280;
        --gray-600: #4b5563;
        --gray-700: #374151;
        --gray-900: #111827;
        --panel: #111827;
        --panel-border: #374151;
        --log-muted: #6b7280;
        --log-in: #fbbf24;
        --log-out: #34d399;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #fff;
        color: var(--gray-900);
      }
      a {
        color: var(--orange);
        text-decoration: underline;
      }
      a:hover {
        color: var(--orange-hover);
      }
      .main {
        max-width: 80rem;
        margin: 0 auto;
        padding: 1.5rem 1rem;
      }
      @media (min-width: 640px) {
        .main {
          padding: 2rem 1.5rem;
        }
      }
      @media (min-width: 1024px) {
        .main {
          padding: 2rem 2rem;
        }
      }
      .page-title {
        margin: 0 0 1rem;
        font-size: 1.25rem;
        font-weight: 700;
      }
      @media (min-width: 640px) {
        .page-title {
          margin-bottom: 1.5rem;
          font-size: 1.5rem;
        }
      }
      .lead {
        margin: 0 0 0.5rem;
        font-size: 0.875rem;
        color: var(--gray-600);
      }
      .lead:last-of-type {
        margin-bottom: 1.5rem;
      }
      @media (min-width: 640px) {
        .lead:last-of-type {
          margin-bottom: 2rem;
        }
      }
      .grid {
        display: grid;
        gap: 1.5rem;
      }
      @media (min-width: 1024px) {
        .grid {
          grid-template-columns: 1fr 320px;
          gap: 2rem;
          align-items: start;
        }
      }
      .runner-card {
        overflow: hidden;
        border-radius: 0.75rem;
        border: 1px solid var(--gray-200);
        background: #fff;
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
      }
      .viewport {
        position: relative;
        isolation: isolate;
        aspect-ratio: 16 / 10;
        width: 100%;
        background: var(--gray-900);
      }
      .viewport.viewport-expanded {
        position: fixed;
        inset: 0;
        z-index: 60;
        aspect-ratio: unset;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #000;
        padding: 0.5rem;
      }
      @media (min-width: 640px) {
        .viewport.viewport-expanded {
          padding: 0.75rem;
        }
      }
      .viewport-inner {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }
      .viewport.viewport-expanded .viewport-inner {
        position: relative;
        flex: 1;
        min-height: 0;
      }
      .viewport iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .fs-btn {
        pointer-events: auto;
        position: absolute;
        bottom: 0.75rem;
        right: 0.75rem;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 9999px;
        border: 1px solid rgb(255 255 255 / 0.15);
        background: rgb(0 0 0 / 0.55);
        color: #fff;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2);
        backdrop-filter: blur(4px);
        cursor: pointer;
        transition: background 0.15s;
      }
      .fs-btn:hover {
        background: rgb(0 0 0 / 0.75);
      }
      .viewport.viewport-expanded .fs-btn {
        bottom: 1.25rem;
        right: 1.25rem;
        width: 2.75rem;
        height: 2.75rem;
      }
      @media (min-width: 640px) {
        .viewport.viewport-expanded .fs-btn {
          bottom: 1.5rem;
          right: 1.5rem;
        }
      }
      .fs-btn svg {
        width: 1.125rem;
        height: 1.125rem;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }
      .aside {
        display: flex;
        flex-direction: column;
      }
      @media (min-width: 1024px) {
        .aside {
          position: sticky;
          top: 1rem;
        }
      }
      .log-panel {
        flex: 1;
        overflow: hidden;
        border-radius: 0.75rem;
        border: 1px solid var(--gray-200);
        background: var(--panel);
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
      }
      .log-head {
        border-bottom: 1px solid var(--panel-border);
        padding: 0.5rem 0.75rem;
      }
      .log-head h2 {
        margin: 0;
        font-size: 0.875rem;
        font-weight: 600;
        color: #e5e7eb;
      }
      .log-body {
        max-height: 20rem;
        overflow-y: auto;
        padding: 0.75rem;
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
      }
      @media (min-width: 640px) {
        .log-body {
          max-height: 24rem;
        }
      }
      .log-empty {
        margin: 0;
        color: var(--log-muted);
      }
      .log-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .log-list li {
        margin-bottom: 0.375rem;
        word-break: break-all;
        color: #d1d5db;
      }
      .log-time {
        color: var(--log-muted);
        margin-right: 0.5rem;
      }
      .log-dir-in {
        color: var(--log-in);
      }
      .log-dir-out {
        color: var(--log-out);
      }
      .log-data {
        display: block;
        padding-left: 1rem;
        color: #9ca3af;
        margin-top: 0.125rem;
      }
      .badge-local {
        margin-left: 0.5rem;
        font-size: 0.65rem;
        font-weight: 600;
        vertical-align: middle;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        background: #fef3c7;
        color: #92400e;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="main">
      <h1 class="page-title" id="page-title">プログラムテスト: ローカルデモプログラム</h1>
      <p class="lead">
        iframe でプログラムを実行し、postMessage のやり取りをログで確認できます。
      </p>
      <p class="lead">
        <a href="#" onclick="return false">投稿者向けの詳細（別タブで開く）</a>
        <span class="badge-local">Docker モック</span>
      </p>

      <div class="grid">
        <div class="runner-card">
          <div class="viewport" id="viewport">
            <div class="viewport-inner">
              <iframe
                id="runner-frame"
                src="/programs/local-demo/"
                title="ローカルデモプログラム"
                sandbox="allow-scripts"
              ></iframe>
            </div>
            <button type="button" class="fs-btn" id="fs-btn" aria-label="プログラム表示を全画面にする">
              <svg id="fs-icon-expand" viewBox="0 0 24 24" aria-hidden="true">
                <polyline
                  points="15 3 21 3 21 9"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <polyline
                  points="9 21 3 21 3 15"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <line x1="21" x2="14" y1="3" y2="10" stroke-linecap="round" />
                <line x1="3" x2="10" y1="21" y2="14" stroke-linecap="round" />
              </svg>
              <svg
                id="fs-icon-collapse"
                viewBox="0 0 24 24"
                aria-hidden="true"
                style="display: none"
              >
                <polyline
                  points="4 14 10 14 10 20"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <polyline
                  points="20 10 14 10 14 4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <line x1="14" x2="21" y1="10" y2="3" stroke-linecap="round" />
                <line x1="3" x2="10" y1="21" y2="14" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>

        <aside class="aside">
          <div class="log-panel">
            <div class="log-head">
              <h2>通信ログ</h2>
            </div>
            <div class="log-body" id="log-body">
              <p class="log-empty" id="log-empty">
                まだログはありません。プログラムが API を呼び出すとここに表示されます。
              </p>
              <ul class="log-list" id="log-list" hidden></ul>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var name = params.get("name");
        if (name) {
          document.getElementById("page-title").textContent = "プログラムテスト: " + name;
          document.getElementById("runner-frame").title = name;
        }

        var viewport = document.getElementById("viewport");
        var fsBtn = document.getElementById("fs-btn");
        var iconEx = document.getElementById("fs-icon-expand");
        var iconCol = document.getElementById("fs-icon-collapse");
        var expanded = false;

        function setFsUi() {
          if (expanded) {
            iconEx.style.display = "none";
            iconCol.style.display = "block";
            fsBtn.setAttribute(
              "aria-label",
              "プログラム表示を通常サイズに戻す"
            );
          } else {
            iconEx.style.display = "block";
            iconCol.style.display = "none";
            fsBtn.setAttribute(
              "aria-label",
              "プログラム表示を全画面にする"
            );
          }
        }

        fsBtn.addEventListener("click", function () {
          expanded = !expanded;
          viewport.classList.toggle("viewport-expanded", expanded);
          document.body.style.overflow = expanded ? "hidden" : "";
          setFsUi();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && expanded) {
            expanded = false;
            viewport.classList.remove("viewport-expanded");
            document.body.style.overflow = "";
            setFsUi();
          }
        });

        var logEmpty = document.getElementById("log-empty");
        var logList = document.getElementById("log-list");
        var iframe = document.getElementById("runner-frame");
        var maxEntries = 200;

        function pad2(n) {
          return n < 10 ? "0" + n : String(n);
        }
        function formatTime(d) {
          return (
            pad2(d.getUTCHours()) +
            ":" +
            pad2(d.getUTCMinutes()) +
            ":" +
            pad2(d.getUTCSeconds()) +
            "." +
            String(d.getUTCMilliseconds()).padStart(3, "0")
          );
        }

        function appendLog(direction, message, data) {
          logEmpty.hidden = true;
          logList.hidden = false;
          var li = document.createElement("li");
          var t = document.createElement("span");
          t.className = "log-time";
          t.textContent = formatTime(new Date());
          li.appendChild(t);
          var dir = document.createElement("span");
          dir.className =
            direction === "in" ? "log-dir-in" : "log-dir-out";
          dir.textContent = "[" + direction + "] ";
          li.appendChild(dir);
          li.appendChild(document.createTextNode(message));
          if (data !== undefined) {
            var pre = document.createElement("span");
            pre.className = "log-data";
            try {
              pre.textContent = JSON.stringify(data);
            } catch {
              pre.textContent = String(data);
            }
            li.appendChild(pre);
          }
          logList.appendChild(li);
          while (logList.children.length > maxEntries) {
            logList.removeChild(logList.firstChild);
          }
          li.scrollIntoView({ block: "nearest" });
        }

        var bridgeBusy = false;

        function isApi042(data) {
          return (
            typeof data === "object" &&
            data !== null &&
            data.api_id === 1 &&
            data.content === null
          );
        }

        function isApi043(data) {
          if (typeof data !== "object" || data === null) return false;
          if (data.api_id !== 2 || !("content" in data)) return false;
          var c = data.content;
          return (
            typeof c === "object" && c !== null && !Array.isArray(c)
          );
        }

        function postBackToChild(source, origin, res, body) {
          var payload;
          if (!res.ok) {
            payload = Object.assign(
              { error: true, status: res.status },
              body && typeof body === "object" ? body : {}
            );
          } else {
            payload = body;
          }
          source.postMessage(payload, origin);
        }

        window.addEventListener("message", function (ev) {
          if (ev.source !== iframe.contentWindow) return;
          appendLog("in", "postMessage received", ev.data);
          var origin = ev.origin;

          if (isApi042(ev.data)) {
            if (bridgeBusy) return;
            bridgeBusy = true;
            void (async function () {
              try {
                var res = await fetch("/api/runner-data", {
                  credentials: "same-origin",
                });
                var body = await res.json().catch(function () {
                  return {};
                });
                appendLog("out", "api_id:1 → data.json 読込", body);
                postBackToChild(ev.source, origin, res, body);
              } catch (err) {
                appendLog("out", "api_id:1 network_error", String(err));
                ev.source.postMessage(
                  { error: true, status: 500, message: "network_error" },
                  origin
                );
              } finally {
                bridgeBusy = false;
              }
            })();
            return;
          }

          if (isApi043(ev.data)) {
            if (bridgeBusy) return;
            bridgeBusy = true;
            void (async function () {
              try {
                var res = await fetch("/api/runner-data", {
                  method: "PUT",
                  credentials: "same-origin",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ content: ev.data.content }),
                });
                var body = await res.json().catch(function () {
                  return {};
                });
                appendLog("out", "api_id:2 → data.json 保存", body);
                postBackToChild(ev.source, origin, res, body);
              } catch (err) {
                appendLog("out", "api_id:2 network_error", String(err));
                ev.source.postMessage(
                  { error: true, status: 500, message: "network_error" },
                  origin
                );
              } finally {
                bridgeBusy = false;
              }
            })();
            return;
          }
        });
      })();
    </script>
  </body>
</html>
